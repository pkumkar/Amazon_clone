<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="style1.css">
</head>

<body>
    <!--Navbar-->>
    <div class="navbar">
        <div class="logo">
            <h2>amazon</h2>
        </div>
        <div class="search"></div>
        <input type="text" placeholder="Seaerch Amazon">
        <button>Search</button>

    </div>
    <div class="nav-links">
        <p>Hello, Sign in</p>
        <p>Returns & Orders</p>
        <p>Cart</p>
    </div>
    <!-- Hero Section -->
    <div class="hero">
        <h1>Welcom to Amazon</h1>
    </div>
    <!-- Product Section -->
    <div class="products">
        <div class="products">
            <img src="https://picsum.photos/200?2" alt="">
            <p>Electronics</p>
        </div>

        <div class="products">
            <img src="https://picsum.photos/200?3" alt="">
            <p>Clothings</p>
        </div>

        <div class="products">
            <img src="https://picsum.photos/200?4" alt="">
            <p>Gaming</p>
        </div>

        <div class="products">
            <img src="https://picsum.photos/200?1" alt="">
            <p>Kitchen</p>
        </div>

    </div>
</body>

</html>
